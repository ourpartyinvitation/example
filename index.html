<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#fbeaff,#e0f7fa);
  color:#333;
}

.container {
  max-width: 800px;
  margin:auto;
  padding:20px;
}

.hero {
  text-align:center;
  padding:50px 20px;
}

.hero h1 {
  font-size:40px;
}

.card {
  background:#fff;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-top:15px;
  background:#ff6fa5;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

button:hover {
  background:#ff3f87;
}

.comment {
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.timestamp {
  font-size:12px;
  color:#888;
}

.fade-in {
  animation: fade 1s ease-in;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>💍 Undangan Pernikahan</h1>
    <p>Kepada Yth:</p>
    <h2 id="guestName">Tamu Undangan</h2>
  </div>

  <!-- FORM RSVP -->
  <div class="card fade-in">
    <h3>Konfirmasi Kehadiran</h3>

    <form id="rsvpForm">
      <label>Nama</label>
      <input type="text" id="nama" readonly>

      <label>Status Kehadiran</label>
      <select id="status">
        <option value="Hadir">Hadir</option>
        <option value="Tidak Hadir">Tidak Hadir</option>
      </select>

      <label>Ucapan</label>
      <textarea id="ucapan" rows="4" placeholder="Tulis ucapan..."></textarea>

      <button type="submit">Kirim</button>
    </form>
  </div>

  <!-- KOMENTAR -->
  <div class="card fade-in">
    <h3>Ucapan & Doa</h3>
    <div id="comments"></div>
  </div>

</div>

<script>
// ============================
// 🔧 CONFIG (WAJIB DIISI)
// ============================
const SCRIPT_URL = "ISI_URL_GOOGLE_APPS_SCRIPT_KAMU_DISINI";

// ============================
// 📌 Ambil nama dari URL
// ============================
const params = new URLSearchParams(window.location.search);
const namaTamu = params.get("to") || "Tamu Undangan";

document.getElementById("guestName").innerText = namaTamu;
document.getElementById("nama").value = namaTamu;

// ============================
// 🚀 Submit Form
// ============================
document.getElementById("rsvpForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    nama: document.getElementById("nama").value,
    status: document.getElementById("status").value,
    ucapan: document.getElementById("ucapan").value
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    alert("Berhasil dikirim!");
    document.getElementById("ucapan").value = "";
    loadComments();
  })
  .catch(err => alert("Gagal kirim"));
});

// ============================
// 📥 Ambil komentar
// ============================
function loadComments() {
  fetch(SCRIPT_URL)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("comments");
      container.innerHTML = "";

      data.slice(0,5).forEach(item => {
        const div = document.createElement("div");
        div.className = "comment";

        div.innerHTML = `
          <strong>${item.nama}</strong> (${item.status})<br>
          ${item.ucapan}<br>
          <span class="timestamp">${item.timestamp}</span>
        `;

        container.appendChild(div);
      });
    });
}

loadComments();
</script>

</body>
</html>
