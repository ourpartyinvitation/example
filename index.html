<script>
// CONFIG
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxNmxfsgLy9PZF_54wQHcFxUE9u7UQ81hX6hRCcDTb8P6C1Qjkz-LQzkh3QFIS4sxrIPg/exec";
const EVENT_DATE="2026-06-24T10:00:00";
const SLIDES=["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg"];

// nama tamu
const params=new URLSearchParams(window.location.search);
const nama=params.get("to")||"Tamu Undangan";
document.getElementById("guestName").innerText=nama;
document.getElementById("coverNama").innerText=nama;
document.getElementById("nama").value=nama;

// GSAP
const tl = gsap.timeline({paused:true});
tl.to("#cover",{opacity:0,duration:1})
  .to("#cover",{display:"none"})
  .from(".section",{opacity:0,y:50,duration:1,stagger:0.3});

// open invite
function openInvite(){
  document.getElementById("music").play();
  tl.play();
}

// slider
const slider=document.getElementById("slider");
SLIDES.forEach((s,i)=>{
  let img=document.createElement("img");
  img.src=s;
  if(i==0) img.classList.add("active");
  slider.appendChild(img);
});
let idx=0;
setInterval(()=>{
  let imgs=document.querySelectorAll(".slider img");
  imgs.forEach(i=>i.classList.remove("active"));
  idx=(idx+1)%imgs.length;
  imgs[idx].classList.add("active");
},4000);

// countdown
setInterval(()=>{
  let now=new Date().getTime();
  let gap=new Date(EVENT_DATE)-now;
  let d=Math.floor(gap/(1000*60*60*24));
  document.getElementById("countdown").innerText="Hari H: "+d+" hari lagi";
},1000);

// ======================
// 🚀 FORM (FIX CORS)
// ======================
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const formData = new FormData();
  formData.append("nama", nama);
  formData.append("status", document.getElementById("status").value);
  formData.append("ucapan", document.getElementById("ucapan").value);

  try {
    const res = await fetch(SCRIPT_URL,{
      method:"POST",
      body: formData
    });

    const text = await res.text();
    console.log("Response:", text);

    alert("Berhasil dikirim!");
    document.getElementById("ucapan").value="";

    loadComments();

  } catch(err){
    console.error(err);
    alert("Gagal kirim");
  }
});

// ======================
// 📥 LOAD COMMENTS
// ======================
async function loadComments(){
  try{
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    let el=document.getElementById("comments");
    el.innerHTML="";

    data.slice(0,5).forEach(d=>{
      el.innerHTML+=`
        <p>
          <b>${d.nama}</b> (${d.status})<br>
          ${d.ucapan}
        </p>
      `;
    });

  }catch(err){
    console.error("Load gagal:",err);
  }
}

loadComments();

</script>
