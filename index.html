<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<!-- GSAP CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0c0c14;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background:url('bg.jpg') center/cover;
  z-index:-2;
  filter:blur(6px) brightness(0.5);
}

/* COVER */
#cover {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  text-align:center;
}

.envelope {
  width:200px;
  height:120px;
  background:#d4af37;
  cursor:pointer;
  margin-top:20px;
}

/* SECTION */
.section {
  opacity:0;
  transform:translateY(50px);
  padding:80px 20px;
  text-align:center;
}

/* CARD */
.card {
  max-width:700px;
  margin:auto;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
}

/* SLIDER */
.slider img {
  width:100%;
  height:400px;
  object-fit:cover;
  position:absolute;
  opacity:0;
}
.slider img.active {
  opacity:1;
  transition:1.5s;
}

/* INPUT */
input, textarea, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button {
  margin-top:10px;
  padding:10px;
  background:#d4af37;
  border:none;
  border-radius:10px;
}

/* COUNTDOWN */
#countdown {
  position:sticky;
  top:0;
  text-align:center;
  background:rgba(0,0,0,0.6);
  padding:10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- COVER -->
<div id="cover">
  <h2>Turut Mengundang</h2>
  <h1 id="coverNama"></h1>
  <div class="envelope" onclick="openInvite()"></div>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<div id="countdown"></div>

<!-- HERO -->
<div class="section">
  <h1>Wedding Invitation</h1>
  <h2 id="guestName"></h2>
</div>

<!-- SLIDER -->
<div class="section">
  <div class="slider" id="slider"></div>
</div>

<!-- RSVP -->
<div class="section">
  <div class="card">
    <h3>RSVP</h3>
    <form id="form">
      <input id="nama" readonly>
      <select id="status">
        <option>Hadir</option>
        <option>Tidak Hadir</option>
      </select>
      <textarea id="ucapan"></textarea>
      <button>Kirim</button>
    </form>
    <div id="comments"></div>
  </div>
</div>

<script>
// CONFIG
const SCRIPT_URL="ISI_URL";
const EVENT_DATE="2026-12-31T10:00:00";
const SLIDES=["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg"];

// nama tamu
const params=new URLSearchParams(window.location.search);
const nama=params.get("to")||"Tamu Undangan";
document.getElementById("guestName").innerText=nama;
document.getElementById("coverNama").innerText=nama;
document.getElementById("nama").value=nama;

// GSAP TIMELINE
const tl = gsap.timeline({paused:true});

// animasi masuk
tl.to("#cover", {opacity:0, duration:1})
  .to("#cover", {display:"none"})
  .from(".section", {
    opacity:0,
    y:50,
    duration:1,
    stagger:0.3,
    ease:"power3.out"
  });

// open invite
function openInvite(){
  document.getElementById("music").play();
  tl.play();
}

// slider cinematic
const slider=document.getElementById("slider");
SLIDES.forEach((s,i)=>{
  let img=document.createElement("img");
  img.src=s;
  if(i==0) img.classList.add("active");
  slider.appendChild(img);
});
let idx=0;
setInterval(()=>{
  let imgs=document.querySelectorAll(".slider img");
  imgs.forEach(i=>i.classList.remove("active"));
  idx=(idx+1)%imgs.length;
  imgs[idx].classList.add("active");
},4000);

// countdown
setInterval(()=>{
  let now=new Date().getTime();
  let gap=new Date(EVENT_DATE)-now;
  let d=Math.floor(gap/(1000*60*60*24));
  document.getElementById("countdown").innerText="Hari H: "+d+" hari lagi";
},1000);

// form
document.getElementById("form").addEventListener("submit",e=>{
  e.preventDefault();
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      nama:nama,
      status:document.getElementById("status").value,
      ucapan:document.getElementById("ucapan").value
    })
  }).then(()=>loadComments());
});

// load comments
function loadComments(){
  fetch(SCRIPT_URL)
  .then(r=>r.json())
  .then(data=>{
    let el=document.getElementById("comments");
    el.innerHTML="";
    data.slice(0,5).forEach(d=>{
      el.innerHTML+=`<p><b>${d.nama}</b><br>${d.ucapan}</p>`;
    });
  });
}
loadComments();

</script>

</body>
</html>
