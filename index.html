<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0c0c14;
  color:white;
  overflow-x:hidden;
}

.bg {
  position:fixed;
  width:100%;
  height:100%;
  background:url('bg.jpg') center/cover;
  z-index:-2;
  filter:blur(6px) brightness(0.5);
}

#cover {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  text-align:center;
}

.envelope {
  width:220px;
  height:120px;
  background:#d4af37;
  cursor:pointer;
  margin-top:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:black;
  border-radius:10px;
}

.section {
  opacity:0;
  transform:translateY(50px);
  padding:80px 20px;
  text-align:center;
}

.card {
  max-width:700px;
  margin:auto;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
}

.slider img {
  width:100%;
  height:400px;
  object-fit:cover;
  position:absolute;
  opacity:0;
}
.slider img.active {
  opacity:1;
  transition:1.5s;
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button {
  margin-top:10px;
  padding:10px;
  background:#d4af37;
  border:none;
  border-radius:10px;
}

#countdown {
  position:sticky;
  top:0;
  text-align:center;
  background:rgba(0,0,0,0.6);
  padding:10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- COVER -->
<div id="cover">
  <h2>Turut Mengundang</h2>
  <h1 id="coverNama"></h1>
  <div class="envelope" onclick="openInvite()">BUKA UNDANGAN</div>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<div id="countdown"></div>

<!-- HERO -->
<div class="section">
  <h1>Wedding Invitation</h1>
  <h2 id="guestName"></h2>
</div>

<!-- SLIDER -->
<div class="section">
  <div class="slider" id="slider"></div>
</div>

<!-- RSVP -->
<div class="section">
  <div class="card">
    <h3>RSVP</h3>
    <form id="form">
      <input id="nama" readonly>
      <select id="status">
        <option>Hadir</option>
        <option>Tidak Hadir</option>
      </select>
      <textarea id="ucapan" placeholder="Tulis ucapan..."></textarea>
      <button type="submit">Kirim</button>
    </form>
    <div id="comments"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxNmxfsgLy9PZF_54wQHcFxUE9u7UQ81hX6hRCcDTb8P6C1Qjkz-LQzkh3QFIS4sxrIPg/exec";
const EVENT_DATE="2026-12-31T10:00:00";
const SLIDES=["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg"];

// ================= NAMA =================
const params=new URLSearchParams(window.location.search);
const nama=params.get("to")||"Tamu Undangan";

document.getElementById("guestName").innerText=nama;
document.getElementById("coverNama").innerText=nama;
document.getElementById("nama").value=nama;

// ================= GSAP =================
const tl = gsap.timeline({paused:true});
tl.to("#cover",{opacity:0,duration:1})
  .to("#cover",{display:"none"})
  .from(".section",{opacity:0,y:50,duration:1,stagger:0.3});

window.openInvite = function(){
  document.getElementById("music").play().catch(()=>{});
  tl.play();
};

// 🔥 AUTO OPEN (biar gak blank)
setTimeout(()=>{
  tl.play();
},1500);

// ================= SLIDER =================
const slider=document.getElementById("slider");
SLIDES.forEach((s,i)=>{
  let img=document.createElement("img");
  img.src=s;
  if(i===0) img.classList.add("active");
  slider.appendChild(img);
});

let idx=0;
setInterval(()=>{
  let imgs=document.querySelectorAll(".slider img");
  imgs.forEach(i=>i.classList.remove("active"));
  idx=(idx+1)%imgs.length;
  imgs[idx].classList.add("active");
},4000);

// ================= COUNTDOWN =================
setInterval(()=>{
  let now=new Date().getTime();
  let gap=new Date(EVENT_DATE)-now;
  let d=Math.floor(gap/(1000*60*60*24));
  document.getElementById("countdown").innerText="Hari H: "+d+" hari lagi";
},1000);

// ================= FORM =================
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const formData = new FormData();
  formData.append("nama", nama);
  formData.append("status", document.getElementById("status").value);
  formData.append("ucapan", document.getElementById("ucapan").value);

  try {
    await fetch(SCRIPT_URL,{
      method:"POST",
      body:formData
    });

    alert("Berhasil dikirim!");
    document.getElementById("ucapan").value="";
    loadComments();

  } catch(err){
    console.error(err);
    alert("Gagal kirim");
  }
});

// ================= LOAD COMMENTS =================
async function loadComments(){
  try{
    const res=await fetch(SCRIPT_URL);
    const data=await res.json();

    let el=document.getElementById("comments");
    el.innerHTML="";

    data.slice(0,5).forEach(d=>{
      el.innerHTML+=`
        <p><b>${d.nama}</b> (${d.status})<br>${d.ucapan}</p>
      `;
    });

  }catch(err){
    console.error(err);
  }
}

loadComments();

});
</script>

</body>
</html>
